<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>割り勘アプリ - Wari-Kan</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      /* 🎨 カラーパレット定義 */
      :root {
        --primary-green: #2ec4b6;
        --primary-green-dark: #20a497;
        --member-blue: #3a86c8;
        --payment-orange: #f77f00;
        --settle-green: #2a9d8f;
        --bg-light: #f7f9f8;
        --text-main: #2d3748;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Sans-Serif;
        padding: 15px;
        max-width: 750px;
        margin: 0 auto;
        background: var(--bg-light);
        color: var(--text-main);
        line-height: 1.6;
      }

      header {
        text-align: center;
        margin-bottom: 25px;
        padding: 10px 0;
      }
      h1 {
        font-size: 1.8em;
        margin: 0;
        color: var(--primary-green-dark);
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      /* 📁 グループ選択エリア */
      .info {
        background: #e6f7f4;
        padding: 18px;
        border-radius: 14px;
        font-size: 0.95em;
        margin-bottom: 20px;
        border-left: 6px solid var(--primary-green);
        box-shadow: 0 4px 12px rgba(46, 196, 182, 0.08);
      }
      .info label {
        color: var(--primary-green-dark);
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      /* 画面分岐用のタブスタイル */
      .tab-menu {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .tab-btn {
        flex: 1;
        padding: 12px;
        background: #e2e8f0;
        color: #4a5568;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s;
      }
      .tab-btn.active {
        background: var(--primary-green);
        color: white;
        box-shadow: 0 4px 10px rgba(46, 196, 182, 0.2);
      }
      .view-section {
        display: none;
      }
      .view-section.active {
        display: block;
      }

      /* 共通カードデザイン */
      .card {
        border: 1px solid #e2e8f0;
        padding: 22px;
        border-radius: 14px;
        margin-bottom: 20px;
        background: #fff;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
      }
      h3 {
        margin-top: 0;
        margin-bottom: 18px;
        font-size: 1.15em;
        color: #4a5568;
        border-left: 4px solid var(--primary-green);
        padding-left: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
        font-size: 0.85em;
        color: #4a5568;
      }

      input,
      select {
        padding: 11px;
        width: 100%;
        box-sizing: border-box;
        border: 1.5px solid #cbd5e0;
        border-radius: 8px;
        font-size: 16px;
        background-color: #fff;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--primary-green);
      }

      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 160px;
        overflow-y: auto;
        border: 1.5px solid #cbd5e0;
        padding: 12px;
        border-radius: 8px;
        background: #fafafa;
      }
      .checkbox-label {
        font-weight: normal;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }
      .checkbox-label input {
        width: auto;
        height: 18px;
        width: 18px;
        accent-color: var(--primary-green);
      }

      button {
        padding: 12px 20px;
        cursor: pointer;
        background: var(--primary-green);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.2s;
      }
      button:hover {
        background: var(--primary-green-dark);
      }
      #settleBtn {
        background: var(--settle-green);
      }
      #settleBtn:hover {
        background: #218276;
      }

      /* リスト表示（2カラム） */
      .flex-container {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }
      .flex-child {
        flex: 1;
        background: #fff;
        border: 1px solid #e2e8f0;
        padding: 18px;
        border-radius: 14px;
      }

      .member-header {
        margin-top: 0;
        border-bottom: 2.5px solid var(--member-blue);
        padding-bottom: 8px;
        color: var(--member-blue);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .member-item-li {
        border-left: 3px solid var(--member-blue);
        background: #f0f7ff;
        margin-bottom: 8px;
        padding: 10px !important;
        border-radius: 0 6px 6px 0;
      }
      .badge {
        background: var(--member-blue);
        color: white;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 0.75em;
        margin-left: 6px;
        font-weight: bold;
      }

      .payment-header {
        margin-top: 0;
        border-bottom: 2.5px solid var(--payment-orange);
        padding-bottom: 8px;
        color: var(--payment-orange);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .payment-item-li {
        border-left: 3px solid var(--payment-orange);
        background: #fffaf0;
        margin-bottom: 8px;
        padding: 10px !important;
        border-radius: 0 6px 6px 0;
      }

      .data-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .data-list li {
        padding: 10px 8px;
        font-size: 0.9em;
      }

      .settlement-list {
        list-style: none;
        padding: 0;
      }
      .settlement-item {
        background: #eefcf6;
        border-left: 5px solid var(--settle-green);
        padding: 14px;
        margin-bottom: 10px;
        border-radius: 8px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #1b4d3e;
      }

      @media (max-width: 768px) {
        body {
          padding: 12px;
        }
        .flex-container {
          flex-direction: column;
          gap: 15px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1><i class="fa-solid fa-scale-balanced"></i> Wari-Kan</h1>
    </header>

    <div class="info">
      <label
        ><i class="fa-solid fa-folder-open"></i> 操作するグループを選択</label
      >
      <select
        id="groupSelect"
        style="margin-top: 5px; width: 100%; font-size: 1.05em; padding: 11px"
      >
        <option value="">-- グループを読み込み中... --</option>
      </select>
    </div>

    <div class="tab-menu">
      <button class="tab-btn active" id="btnUserView">
        <i class="fa-solid fa-wallet"></i> 割り勘・精算 (一般)
      </button>
      <button class="tab-btn" id="btnAdminView">
        <i class="fa-solid fa-list-check"></i> グループ管理 (設定)
      </button>
    </div>

    <div id="sectionUserView" class="view-section active">
      <div class="flex-container">
        <div class="flex-child">
          <h4 class="member-header">
            <i class="fa-solid fa-users"></i> 登録メンバー
          </h4>
          <ul id="memberListOutput" class="data-list">
            <li style="color: #888">グループを選択してください</li>
          </ul>
        </div>
        <div class="flex-child">
          <h4 class="payment-header">
            <i class="fa-solid fa-receipt"></i> 支払い履歴
          </h4>
          <ul id="paymentListOutput" class="data-list">
            <li style="color: #888">グループを選択してください</li>
          </ul>
        </div>
      </div>

      <div class="card">
        <h3>
          <i class="fa-solid fa-credit-card"></i> 支払い（立て替え）の記録
        </h3>
        <div class="form-group">
          <label>支払った人</label
          ><select id="payerSelect">
            <option value="">-- 先にメンバーを追加 --</option>
          </select>
        </div>
        <div class="form-group">
          <label>日付</label><input type="date" id="paymentDateInput" />
        </div>
        <div class="form-group">
          <label>金額（円）</label
          ><input
            type="number"
            id="paymentAmountInput"
            placeholder="例: 5000"
          />
        </div>
        <div class="form-group">
          <label>内容</label
          ><input
            type="text"
            id="paymentDescInput"
            placeholder="例: レンタカー代"
          />
        </div>
        <div class="form-group">
          <label>割り勘の対象（誰の分？）</label>
          <div class="checkbox-group" id="participantsGroup">
            （メンバーを追加するとここに並びます）
          </div>
        </div>
        <button id="createPaymentBtn">
          <i class="fa-solid fa-floppy-disk"></i> 支払い記録を保存
        </button>
      </div>

      <div class="card" style="border: 2.5px solid var(--settle-green)">
        <h3 style="border-left-color: var(--settle-green)">
          <i class="fa-solid fa-handshake"></i> 最終清算スクリプトを実行
        </h3>
        <button id="settleBtn">
          <i class="fa-solid fa-calculator"></i> このグループの清算結果を計算
        </button>
        <div id="settlementResultArea" style="margin-top: 15px"></div>
      </div>
    </div>

    <div id="sectionAdminView" class="view-section">
      <div class="card">
        <h3><i class="fa-solid fa-plus"></i> 新しいグループを作る</h3>
        <div class="form-group">
          <input type="text" id="groupNameInput" placeholder="例: スキー旅行" />
        </div>
        <button id="createGroupBtn">
          <i class="fa-solid fa-check"></i> グループ作成
        </button>
      </div>

      <div class="card">
        <h3><i class="fa-solid fa-tags"></i> カテゴリ（傾斜）登録</h3>
        <div class="form-group">
          <label>カテゴリ名</label
          ><input
            type="text"
            id="categoryNameInput"
            placeholder="例: 多め、普通"
          />
        </div>
        <div class="form-group">
          <label>比率（重み）</label
          ><input
            type="number"
            id="categoryWeightInput"
            step="0.1"
            value="1.0"
          />
        </div>
        <button id="createCategoryBtn">
          <i class="fa-solid fa-check"></i> カテゴリ登録
        </button>
      </div>

      <div class="card">
        <h3><i class="fa-solid fa-user-plus"></i> メンバー追加</h3>
        <div class="form-group">
          <label>メンバー名</label
          ><input type="text" id="memberNameInput" placeholder="例: 太郎" />
        </div>
        <div class="form-group">
          <label>カテゴリ</label
          ><select id="categorySelect">
            <option value="">-- 先にカテゴリを登録 --</option>
          </select>
        </div>
        <button id="createMemberBtn">
          <i class="fa-solid fa-check"></i> メンバー追加
        </button>
      </div>
    </div>

    <script>
      const API_BASE_URL = "/api";
      let activeGroupId = "";

      // DOMの取得
      const groupSelect = document.getElementById("groupSelect");
      const categorySelect = document.getElementById("categorySelect");
      const payerSelect = document.getElementById("payerSelect");
      const participantsGroup = document.getElementById("participantsGroup");
      const settlementResultArea = document.getElementById(
        "settlementResultArea",
      );
      const memberListOutput = document.getElementById("memberListOutput");
      const paymentListOutput = document.getElementById("paymentListOutput");

      // タブ切り替えのイベント設定
      const btnUserView = document.getElementById("btnUserView");
      const btnAdminView = document.getElementById("btnAdminView");
      const sectionUserView = document.getElementById("sectionUserView");
      const sectionAdminView = document.getElementById("sectionAdminView");

      btnUserView.addEventListener("click", () => {
        btnUserView.classList.add("active");
        btnAdminView.classList.remove("active");
        sectionUserView.classList.add("active");
        sectionAdminView.classList.remove("active");
      });
      btnAdminView.addEventListener("click", () => {
        btnAdminView.classList.add("active");
        btnUserView.classList.remove("active");
        sectionAdminView.classList.add("active");
        sectionUserView.classList.remove("active");
      });

      // API通信ロジック
      async function loadGroupList(selectedId = null) {
        try {
          const res = await fetch(`${API_BASE_URL}/groups`);
          const groups = await res.json();
          groupSelect.innerHTML =
            '<option value="">-- グループを選択してください --</option>';
          groups.forEach((g) => {
            const opt = document.createElement("option");
            opt.value = g.id;
            opt.textContent = g.name;
            if (g.id === selectedId) opt.selected = true;
            groupSelect.appendChild(opt);
          });
          if (selectedId) await fetchAndRefreshGroupDetails(selectedId);
        } catch (e) {
          groupSelect.innerHTML =
            '<option value="">エラー: グループ読み込み失敗</option>';
        }
      }

      async function fetchAndRefreshGroupDetails(groupId) {
        if (!groupId) {
          clearFormFields();
          return;
        }
        try {
          const res = await fetch(`${API_BASE_URL}/groups/${groupId}`);
          if (!res.ok) throw new Error("グループが見つかりません");
          const group = await res.json();
          activeGroupId = group.id;
          settlementResultArea.innerHTML = "";

          // 👥 メンバーリスト
          memberListOutput.innerHTML =
            group.members.length === 0
              ? '<li style="color:#888;">メンバーはいません</li>'
              : "";
          group.members.forEach((m) => {
            const li = document.createElement("li");
            li.className = "member-item-li";
            li.innerHTML = `<i class="fa-regular fa-user" style="color: var(--member-blue); margin-right: 5px;"></i> <strong>${m.name}</strong> <span class="badge">${m.category.name} (${m.category.weight}倍)</span>`;
            memberListOutput.appendChild(li);
          });

          // 🧾 支払い履歴
          paymentListOutput.innerHTML =
            group.payments.length === 0
              ? '<li style="color:#888;">履歴はありません</li>'
              : "";
          group.payments.forEach((p) => {
            const li = document.createElement("li");
            li.className = "payment-item-li";
            const participantNames =
              p.participants && p.participants.length > 0
                ? p.participants.map((part) => part.member.name).join("、")
                : "全員";
            const formattedDate = p.date
              ? new Date(p.date).toLocaleDateString("ja-JP")
              : "日付未登録";
            li.innerHTML = `
                        <i class="fa-solid fa-coins" style="color: var(--payment-orange); margin-right: 5px;"></i> <strong>${p.amount.toLocaleString()}円</strong> - ${p.description || "無題"} 
                        <span style="color: #777; font-size: 0.85em; margin-left: 8px;"><i class="fa-regular fa-calendar"></i> ${formattedDate}</span><br>
                        <small style="color:#555;">支払者: <strong>${p.payer.name}</strong> / 対象者: [ ${participantNames} ]</small>`;
            paymentListOutput.appendChild(li);
          });

          // 各種セレクト・チェックボックスの同期
          categorySelect.innerHTML =
            group.categories.length === 0
              ? '<option value="">-- 先にカテゴリを登録 --</option>'
              : "";
          group.categories.forEach((c) => {
            const opt = document.createElement("option");
            opt.value = c.id;
            opt.textContent = `${c.name} (${c.weight}倍)`;
            categorySelect.appendChild(opt);
          });

          payerSelect.innerHTML =
            group.members.length === 0
              ? '<option value="">-- 先にメンバーを追加 --</option>'
              : "";
          group.members.forEach((m) => {
            const opt = document.createElement("option");
            opt.value = m.id;
            opt.textContent = `${m.name} (${m.category.name})`;
            payerSelect.appendChild(opt);
          });

          participantsGroup.innerHTML =
            group.members.length === 0
              ? "（メンバーを追加するとここに並びます）"
              : "";
          group.members.forEach((m) => {
            const lbl = document.createElement("label");
            lbl.className = "checkbox-label";
            lbl.innerHTML = `<input type="checkbox" value="${m.id}" checked> ${m.name} <span style="color:#777; font-size:0.85em;">(${m.category.name})</span>`;
            participantsGroup.appendChild(lbl);
          });
        } catch (e) {
          alert("データ取得エラー: " + e.message);
        }
      }

      function clearFormFields() {
        activeGroupId = "";
        categorySelect.innerHTML =
          '<option value="">-- 先にカテゴリを登録 --</option>';
        payerSelect.innerHTML =
          '<option value="">-- 先にメンバーを追加 --</option>';
        participantsGroup.innerHTML = "（メンバーを追加するとここに並びます）";
        memberListOutput.innerHTML =
          '<li style="color:#888;">グループを選択してください</li>';
        paymentListOutput.innerHTML =
          '<li style="color:#888;">グループを選択してください</li>';
        settlementResultArea.innerHTML = "";
      }

      groupSelect.addEventListener("change", (e) => {
        fetchAndRefreshGroupDetails(e.target.value);
      });

      // 各種作成・保存ボタンイベント
      document
        .getElementById("createGroupBtn")
        .addEventListener("click", async () => {
          const name = document.getElementById("groupNameInput").value.trim();
          if (!name) return alert("グループ名を入力");
          try {
            const res = await fetch(`${API_BASE_URL}/groups`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name }),
            });
            const data = await res.json();
            if (res.ok) {
              document.getElementById("groupNameInput").value = "";
              await loadGroupList(data.id);
            }
          } catch (e) {
            alert(e.message);
          }
        });

      document
        .getElementById("createCategoryBtn")
        .addEventListener("click", async () => {
          if (!activeGroupId) return alert("グループを選択してください");
          const name = document
            .getElementById("categoryNameInput")
            .value.trim();
          const weight = document.getElementById("categoryWeightInput").value;
          if (!name) return alert("カテゴリ名入力");
          try {
            const res = await fetch(
              `${API_BASE_URL}/groups/${activeGroupId}/categories`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, weight }),
              },
            );
            if (res.ok) {
              document.getElementById("categoryNameInput").value = "";
              await fetchAndRefreshGroupDetails(activeGroupId);
            }
          } catch (e) {
            alert(e.message);
          }
        });

      document
        .getElementById("createMemberBtn")
        .addEventListener("click", async () => {
          if (!activeGroupId) return alert("グループを選択してください");
          const name = document.getElementById("memberNameInput").value.trim();
          const categoryId = categorySelect.value;
          if (!name || !categoryId) return alert("入力漏れがあります");
          try {
            const res = await fetch(
              `${API_BASE_URL}/groups/${activeGroupId}/members`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, categoryId }),
              },
            );
            if (res.ok) {
              document.getElementById("memberNameInput").value = "";
              await fetchAndRefreshGroupDetails(activeGroupId);
            }
          } catch (e) {
            alert(e.message);
          }
        });

      document
        .getElementById("createPaymentBtn")
        .addEventListener("click", async () => {
          if (!activeGroupId) return alert("グループを選択してください");
          const payerId = payerSelect.value;
          const date = document.getElementById("paymentDateInput").value;
          const amount = document.getElementById("paymentAmountInput").value;
          const description = document
            .getElementById("paymentDescInput")
            .value.trim();
          const checkboxes = participantsGroup.querySelectorAll(
            'input[type="checkbox"]:checked',
          );
          const participantIds = Array.from(checkboxes).map((cb) => cb.value);
          if (!payerId || !amount || participantIds.length === 0)
            return alert("入力項目が不足しています");
          try {
            const res = await fetch(
              `${API_BASE_URL}/groups/${activeGroupId}/payments`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  payerId,
                  amount,
                  description,
                  participantIds,
                  date,
                }),
              },
            );
            if (res.ok) {
              alert("支払い記録を保存しました！");
              document.getElementById("paymentDateInput").value = "";
              document.getElementById("paymentAmountInput").value = "";
              document.getElementById("paymentDescInput").value = "";
              await fetchAndRefreshGroupDetails(activeGroupId);
            }
          } catch (e) {
            alert(e.message);
          }
        });

      document
        .getElementById("settleBtn")
        .addEventListener("click", async () => {
          if (!activeGroupId) return alert("グループを選択してください");
          settlementResultArea.innerHTML = "計算中...";
          try {
            const res = await fetch(
              `${API_BASE_URL}/groups/${activeGroupId}/settlements`,
            );
            const data = await res.json();
            if (res.ok) {
              if (data.length === 0) {
                settlementResultArea.innerHTML =
                  "<p>🎉 すべて清算済み、または支払いがありません！</p>";
                return;
              }
              let html = '<ul class="settlement-list">';
              data.forEach((s) => {
                html += `<li class="settlement-item"><i class="fa-solid fa-arrow-right-arrow-left" style="color: var(--settle-green);"></i><span><strong>${s.from.name}</strong> さん ➡ <strong>${s.to.name}</strong> さんへ <strong>【${s.amount.toLocaleString()} 円】</strong> 支払う</span></li>`;
              });
              html += "</ul>";
              settlementResultArea.innerHTML = html;
            }
          } catch (e) {
            settlementResultArea.innerHTML = "エラーが発生しました";
          }
        });

      loadGroupList();
    </script>
  </body>
</html>
