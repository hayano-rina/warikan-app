<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>割り勘アプリ</title>
    <style>
      /* 🎨 カラーパレット定義 */
      :root {
        --primary-green: #2ec4b6; /* テーマカラー：やさしいミントグリーン */
        --primary-green-dark: #20a497; /* ボタンホバー時の濃い緑 */
        --member-blue: #3a86c8; /* メンバーのテーマ：ブルー */
        --payment-orange: #f77f00; /* 支払い履歴のテーマ：暖色オレンジ */
        --settle-green: #2a9d8f; /* 清算結果のテーマ：深めのグリーン */
        --bg-light: #f7f9f8; /* 全体の背景：ごく薄い緑がかったグレー */
        --text-main: #2d3748; /* メインの文字色 */
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        padding: 15px;
        max-width: 750px;
        margin: 0 auto;
        background: var(--bg-light);
        color: var(--text-main);
        line-height: 1.6;
      }

      /* ヘッダーデザイン */
      header {
        text-align: center;
        margin-bottom: 25px;
        padding: 10px 0;
      }
      h1 {
        font-size: 1.8em;
        margin: 0;
        color: var(--primary-green-dark);
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      /* 📁 グループ選択エリア（やさしい緑ベース） */
      .info {
        background: #e6f7f4;
        padding: 18px;
        border-radius: 14px;
        font-size: 0.95em;
        margin-bottom: 20px;
        border-left: 6px solid var(--primary-green);
        box-shadow: 0 4px 12px rgba(46, 196, 182, 0.08);
      }
      .info label {
        color: var(--primary-green-dark);
        font-size: 1em;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      /* 共通カードデザイン */
      .card {
        border: 1px solid #e2e8f0;
        padding: 22px;
        border-radius: 14px;
        margin-bottom: 20px;
        background: #fff;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
      }
      h3 {
        margin-top: 0;
        margin-bottom: 18px;
        font-size: 1.15em;
        color: #4a5568;
        border-left: 4px solid var(--primary-green);
        padding-left: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
        font-size: 0.85em;
        color: #4a5568;
      }

      input,
      select {
        padding: 11px;
        width: 100%;
        box-sizing: border-box;
        border: 1.5px solid #cbd5e0;
        border-radius: 8px;
        font-size: 16px;
        background-color: #fff;
        transition: border-color 0.2s;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: var(--primary-green);
      }

      /* 割り勘チェックボックス */
      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 160px;
        overflow-y: auto;
        border: 1.5px solid #cbd5e0;
        padding: 12px;
        border-radius: 8px;
        background: #fafafa;
      }
      .checkbox-label {
        font-weight: normal;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        font-size: 0.95em;
      }
      .checkbox-label input {
        width: auto;
        height: 18px;
        width: 18px;
        accent-color: var(--primary-green);
      }

      /* 統一された緑ボタン */
      button {
        padding: 12px 20px;
        cursor: pointer;
        background: var(--primary-green);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 1em;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      button:hover {
        background: var(--primary-green-dark);
      }
      button:active {
        transform: scale(0.98);
      }

      /* 特別な清算実行ボタン */
      #settleBtn {
        background: var(--settle-green);
      }
      #settleBtn:hover {
        background: #218276;
      }

      /* 🌟 リスト表示（2カラム）の色分け工夫 */
      .flex-container {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }
      .flex-child {
        flex: 1;
        background: #fff;
        border: 1px solid #e2e8f0;
        padding: 18px;
        border-radius: 14px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
      }

      /* 👥 メンバーリスト（ブルー系に色分け） */
      .member-header {
        margin-top: 0;
        border-bottom: 2.5px solid var(--member-blue);
        padding-bottom: 8px;
        color: var(--member-blue);
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 1.05em;
      }
      .member-item-li {
        border-left: 3px solid var(--member-blue);
        background: #f0f7ff;
        margin-bottom: 8px;
        padding: 10px !important;
        border-radius: 0 6px 6px 0;
      }
      .badge {
        background: var(--member-blue);
        color: white;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 0.75em;
        margin-left: 6px;
        font-weight: bold;
      }

      /* 🧾 支払い履歴（暖色オレンジ系に色分け） */
      .payment-header {
        margin-top: 0;
        border-bottom: 2.5px solid var(--payment-orange);
        padding-bottom: 8px;
        color: var(--payment-orange);
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 1.05em;
      }
      .payment-item-li {
        border-left: 3px solid var(--payment-orange);
        background: #fffaf0;
        margin-bottom: 8px;
        padding: 10px !important;
        border-radius: 0 6px 6px 0;
      }

      .data-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .data-list li {
        padding: 10px 8px;
        font-size: 0.9em;
      }

      /* 清算結果（深緑系） */
      .settlement-list {
        list-style: none;
        padding: 0;
      }
      .settlement-item {
        background: #eefcf6;
        border-left: 5px solid var(--settle-green);
        padding: 14px;
        margin-bottom: 10px;
        border-radius: 8px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 10px;
        color: #1b4d3e;
      }

      pre {
        background: #1a202c;
        color: #edf2f7;
        padding: 15px;
        border-radius: 8px;
        overflow-x: auto;
        font-size: 0.85em;
      }

      /* 📱 【超重要】スマートフォン（画面幅768px以下）用の設定 */
      @media (max-width: 768px) {
        body {
          padding: 10px;
        }
        h1 {
          font-size: 1.5em;
        }

        /* 2カラムだったメンバー・履歴リストを「縦並び」に強制変換 */
        .flex-container {
          flex-direction: column;
          gap: 15px;
        }

        /* 入力欄の左右パディングを少し狭めて画面を広く使う */
        .card {
          padding: 15px;
          border-radius: 8px;
        }
      }
    </style>
  </head>
  <body>
    <h1>割り勘アプリ 📱</h1>

    <div class="info">
      <label style="color: #0056b3">📁 操作するグループを選択</label>
      <select
        id="groupSelect"
        style="margin-top: 5px; width: 100%; font-size: 1.05em; padding: 10px"
      >
        <option value="">-- グループを読み込み中... --</option>
      </select>
    </div>

    <div class="flex-container">
      <div class="flex-child">
        <h4
          style="
            margin-top: 0;
            border-bottom: 2px solid #007bff;
            padding-bottom: 5px;
          "
        >
          👥 登録メンバー
        </h4>
        <ul id="memberListOutput" class="data-list">
          <li style="color: #888">グループを選択してください</li>
        </ul>
      </div>
      <div class="flex-child">
        <h4
          style="
            margin-top: 0;
            border-bottom: 2px solid #dc3545;
            padding-bottom: 5px;
          "
        >
          🧾 支払い履歴
        </h4>
        <ul id="paymentListOutput" class="data-list">
          <li style="color: #888">グループを選択してください</li>
        </ul>
      </div>
    </div>

    <div class="card">
      <h3>1. 新しいグループを作る</h3>
      <div class="form-group">
        <input type="text" id="groupNameInput" placeholder="例: スキー旅行" />
      </div>
      <button id="createGroupBtn">グループ作成</button>
    </div>

    <div class="card">
      <h3>2. カテゴリ（傾斜）登録</h3>
      <div class="form-group">
        <label>カテゴリ名</label
        ><input
          type="text"
          id="categoryNameInput"
          placeholder="例: 多め、普通"
        />
      </div>
      <div class="form-group">
        <label>比率（重み）</label
        ><input type="number" id="categoryWeightInput" step="0.1" value="1.0" />
      </div>
      <button id="createCategoryBtn">カテゴリ登録</button>
    </div>

    <div class="card">
      <h3>3. メンバー追加</h3>
      <div class="form-group">
        <label>メンバー名</label
        ><input type="text" id="memberNameInput" placeholder="例: 太郎" />
      </div>
      <div class="form-group">
        <label>カテゴリ</label
        ><select id="categorySelect">
          <option value="">-- 先にカテゴリを登録 --</option>
        </select>
      </div>
      <button id="createMemberBtn">メンバー追加</button>
    </div>

    <div class="card">
      <h3>4. 支払い（立て替え）の記録</h3>
      <div class="form-group">
        <label>支払った人</label>
        <select id="payerSelect">
          <option value="">-- 先にメンバーを追加 --</option>
        </select>
      </div>
      <div class="form-group">
        <label>日付</label><input type="date" id="paymentDateInput" />
      </div>
      <div class="form-group">
        <label>金額（円）</label
        ><input type="number" id="paymentAmountInput" placeholder="例: 5000" />
      </div>
      <div class="form-group">
        <label>内容</label
        ><input
          type="text"
          id="paymentDescInput"
          placeholder="例: レンタカー代"
        />
      </div>
      <div class="form-group">
        <label>割り勘の対象（誰の分？）</label>
        <div class="checkbox-group" id="participantsGroup">
          （メンバーを追加するとここに並びます）
        </div>
      </div>
      <button id="createPaymentBtn">支払い記録を保存</button>
    </div>

    <div class="card" style="border: 2px solid #28a745">
      <h3>5. 最終清算スクリプトを実行</h3>
      <button id="settleBtn">このグループの清算結果を計算</button>
      <div id="settlementResultArea" style="margin-top: 15px"></div>
    </div>

    <script>
      // パスを相対パスに一本化したため、このままどこでも動きます！
      const API_BASE_URL = "/api";

      let activeGroupId = "";

      const groupSelect = document.getElementById("groupSelect");
      const categorySelect = document.getElementById("categorySelect");
      const payerSelect = document.getElementById("payerSelect");
      const participantsGroup = document.getElementById("participantsGroup");
      const settlementResultArea = document.getElementById(
        "settlementResultArea",
      );

      // 新しい登録リスト用エレメント
      const memberListOutput = document.getElementById("memberListOutput");
      const paymentListOutput = document.getElementById("paymentListOutput");

      // DBにあるグループ一覧を取得してプルダウンを構築
      async function loadGroupList(selectedId = null) {
        try {
          const res = await fetch(`${API_BASE_URL}/groups`);
          const groups = await res.json();

          groupSelect.innerHTML =
            '<option value="">-- グループを選択してください --</option>';
          groups.forEach((g) => {
            const opt = document.createElement("option");
            opt.value = g.id;
            opt.textContent = g.name;
            if (g.id === selectedId) opt.selected = true;
            groupSelect.appendChild(opt);
          });

          if (selectedId) {
            await fetchAndRefreshGroupDetails(selectedId);
          }
        } catch (e) {
          groupSelect.innerHTML =
            '<option value="">エラー: グループを読み込めませんでした</option>';
        }
      }

      // 選択されたグループの詳細データを読み込み、すべてのリスト・プルダウンを連動リフレッシュ
      async function fetchAndRefreshGroupDetails(groupId) {
        if (!groupId) {
          clearFormFields();
          return;
        }
        try {
          const res = await fetch(`${API_BASE_URL}/groups/${groupId}`);
          if (!res.ok) throw new Error("グループが見つかりません");
          const group = await res.json();

          activeGroupId = group.id;
          settlementResultArea.innerHTML = "";

          // 🌟 新機能1: 登録メンバーリストを表示 (所属カテゴリと比率付き)
          memberListOutput.innerHTML =
            group.members.length === 0
              ? '<li style="color:#888;">メンバーはいません</li>'
              : "";
          group.members.forEach((m) => {
            const li = document.createElement("li");
            li.innerHTML = `👤 <strong>${m.name}</strong> <span class="badge">${m.category.name} (${m.category.weight}倍)</span>`;
            memberListOutput.appendChild(li);
          });

          // 🌟 新機能2: 支払い履歴一覧をわかりやすくリスト表示（対象メンバーの並び替え・追加版）
          paymentListOutput.innerHTML =
            group.payments.length === 0
              ? '<li style="color:#888;">履歴はありません</li>'
              : "";
          group.payments.forEach((p) => {
            const li = document.createElement("li");

            const participantNames =
              p.participants && p.participants.length > 0
                ? p.participants.map((part) => part.member.name).join("、")
                : "全員";

            // 🌟 日付を「YYYY/MM/DD」の形式に綺麗に変換する
            const formattedDate = p.date
              ? new Date(p.date).toLocaleDateString("ja-JP")
              : "日付なし";

            li.innerHTML = `
              💸 <strong>${p.amount.toLocaleString()}円</strong> - ${p.description || "無題"} 
              <span style="color: #666; font-size: 0.85em; margin-left: 10px;">📅 ${formattedDate}</span><br>
              <small style="color:#666;">
                支払者: <strong>${p.payer.name}</strong><br>
                対象者: [ ${participantNames} ]
              </small>
            `;
            paymentListOutput.appendChild(li);
          });

          // 3. カテゴリ登録用のプルダウン
          categorySelect.innerHTML =
            group.categories.length === 0
              ? '<option value="">-- 先にカテゴリを登録 --</option>'
              : "";
          group.categories.forEach((c) => {
            const opt = document.createElement("option");
            opt.value = c.id;
            opt.textContent = `${c.name} (${c.weight}倍)`;
            categorySelect.appendChild(opt);
          });

          // 🌟 新機能3: 支払った人ドロップダウンにカテゴリを（かっこ）で併記
          payerSelect.innerHTML =
            group.members.length === 0
              ? '<option value="">-- 先にメンバーを追加 --</option>'
              : "";
          group.members.forEach((m) => {
            const opt = document.createElement("option");
            opt.value = m.id;
            opt.textContent = `${m.name} (${m.category.name})`; // カッコ書きを追加！
            payerSelect.appendChild(opt);
          });

          // 5. 割り勘対象チェックボックス（ここにもカッコ表記を導入！）
          participantsGroup.innerHTML =
            group.members.length === 0
              ? "（メンバーを追加するとここに並びます）"
              : "";
          group.members.forEach((m) => {
            const lbl = document.createElement("label");
            lbl.className = "checkbox-label";
            lbl.innerHTML = `<input type="checkbox" value="${m.id}" checked> ${m.name} <span style="color:#777; font-size:0.85em;">(${m.category.name})</span>`;
            participantsGroup.appendChild(lbl);
          });
        } catch (e) {
          alert("データ取得エラー: " + e.message);
        }
      }

      function clearFormFields() {
        activeGroupId = "";
        categorySelect.innerHTML =
          '<option value="">-- 先にカテゴリを登録 --</option>';
        payerSelect.innerHTML =
          '<option value="">-- 先にメンバーを追加 --</option>';
        participantsGroup.innerHTML = "（メンバーを追加するとここに並びます）";
        memberListOutput.innerHTML =
          '<li style="color:#888;">グループを選択してください</li>';
        paymentListOutput.innerHTML =
          '<li style="color:#888;">グループを選択してください</li>';
        settlementResultArea.innerHTML = "";
      }

      groupSelect.addEventListener("change", (e) => {
        fetchAndRefreshGroupDetails(e.target.value);
      });

      // 1. グループ作成
      document
        .getElementById("createGroupBtn")
        .addEventListener("click", async () => {
          const name = document.getElementById("groupNameInput").value.trim();
          if (!name) return alert("グループ名を入力");
          try {
            const res = await fetch(`${API_BASE_URL}/groups`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name }),
            });
            const data = await res.json();
            if (res.ok) {
              document.getElementById("groupNameInput").value = "";
              await loadGroupList(data.id);
            }
          } catch (e) {
            alert(e.message);
          }
        });

      // 2. カテゴリ登録
      document
        .getElementById("createCategoryBtn")
        .addEventListener("click", async () => {
          if (!activeGroupId) return alert("グループを選択してください");
          const name = document
            .getElementById("categoryNameInput")
            .value.trim();
          const weight = document.getElementById("categoryWeightInput").value;
          if (!name) return alert("カテゴリ名入力");
          try {
            const res = await fetch(
              `${API_BASE_URL}/groups/${activeGroupId}/categories`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, weight }),
              },
            );
            if (res.ok) {
              document.getElementById("categoryNameInput").value = "";
              await fetchAndRefreshGroupDetails(activeGroupId);
            }
          } catch (e) {
            alert(e.message);
          }
        });

      // 3. メンバー追加
      document
        .getElementById("createMemberBtn")
        .addEventListener("click", async () => {
          if (!activeGroupId) return alert("グループを選択してください");
          const name = document.getElementById("memberNameInput").value.trim();
          const categoryId = categorySelect.value;
          if (!name || !categoryId) return alert("入力漏れがあります");
          try {
            const res = await fetch(
              `${API_BASE_URL}/groups/${activeGroupId}/members`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, categoryId }),
              },
            );
            if (res.ok) {
              document.getElementById("memberNameInput").value = "";
              await fetchAndRefreshGroupDetails(activeGroupId);
            }
          } catch (e) {
            alert(e.message);
          }
        });

      // 4. 支払い記録の登録
      document
        .getElementById("createPaymentBtn")
        .addEventListener("click", async () => {
          if (!activeGroupId) return alert("グループを選択してください");
          const payerId = payerSelect.value;
          const date = document.getElementById("paymentDateInput").value; // 🌟 日付の値を取得
          const amount = document.getElementById("paymentAmountInput").value;
          const description = document
            .getElementById("paymentDescInput")
            .value.trim();
          const checkboxes = participantsGroup.querySelectorAll(
            'input[type="checkbox"]:checked',
          );
          const participantIds = Array.from(checkboxes).map((cb) => cb.value);

          if (!payerId || !amount || participantIds.length === 0)
            return alert("入力項目が不足しています");

          try {
            const res = await fetch(
              `${API_BASE_URL}/groups/${activeGroupId}/payments`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  payerId,
                  amount,
                  description,
                  participantIds,
                  date,
                }), // 🌟 bodyに date を追加！
              },
            );
            if (res.ok) {
              alert("支払い記録を保存しました！");
              document.getElementById("paymentDateInput").value = ""; // 🌟 入力欄をクリア
              document.getElementById("paymentAmountInput").value = "";
              document.getElementById("paymentDescInput").value = "";
              await fetchAndRefreshGroupDetails(activeGroupId);
            }
          } catch (e) {
            alert(e.message);
          }
        });

      // 5. 清算結果の取得
      document
        .getElementById("settleBtn")
        .addEventListener("click", async () => {
          if (!activeGroupId) return alert("グループを選択してください");
          settlementResultArea.innerHTML = "計算中...";
          try {
            const res = await fetch(
              `${API_BASE_URL}/groups/${activeGroupId}/settlements`,
            );
            const data = await res.json();
            if (res.ok) {
              if (data.length === 0) {
                settlementResultArea.innerHTML =
                  "<p>🎉 すべて清算済み、または支払いがありません！</p>";
                return;
              }
              let html = '<ul class="settlement-list">';
              data.forEach((s) => {
                html += `<li class="settlement-item">💰 ${s.from.name} ➡ ${s.to.name} へ 【${s.amount.toLocaleString()} 円】 支払う</li>`;
              });
              html += "</ul>";
              settlementResultArea.innerHTML = html;
            }
          } catch (e) {
            settlementResultArea.innerHTML = "エラーが発生しました";
          }
        });

      loadGroupList();
    </script>
  </body>
</html>
